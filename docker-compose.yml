services:
  postgres:
    image: postgres:16-alpine
    container_name: compact-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: compact_tracker
    ports:
      - "5432:5432"
    volumes:
      - compact_tracker_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d compact_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  compact_tracker_pg:
